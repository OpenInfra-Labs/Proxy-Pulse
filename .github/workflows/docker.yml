name: Docker Build & Push

on:
  workflow_run:
    workflows: ["Build & Release"]
    types: [completed]

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_branch, 'v') }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: meta
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          VERSION=${TAG#v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download Linux binaries from release
        run: |
          mkdir -p bin
          TAG="${{ steps.meta.outputs.tag }}"
          for arch in amd64 arm64; do
            ASSET="proxy-pulse-linux-${arch}.tar.gz"
            URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${ASSET}"
            echo "Downloading ${URL}..."
            curl -fsSL -o "${ASSET}" "${URL}"
            tar xzf "${ASSET}"
            mv "proxy-pulse-linux-${arch}" "bin/proxy-pulse-${arch}"
            rm "${ASSET}"
          done
          # Map Docker TARGETARCH names
          ls -la bin/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: openinfralabs
          password: ${{ secrets.DOCKERHUBTOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            openinfralabs/proxy-pulse:${{ steps.meta.outputs.version }}
            openinfralabs/proxy-pulse:latest
